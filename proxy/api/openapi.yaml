openapi: 3.1.0

info:
  description: API to search for OpenRailwayMap-vector
  contact:
    name: Hidde Wieringa
    email: openrailwaymap@hiddewieringa.nl
    url: https://github.com/hiddewie/OpenRailwayMap-vector
  license:
    identifier: GPL-2.0-or-later
    name: GNU General Public License v2.0 or later
  title: OpenRailwayMap API
  version: current

servers:
  - url: https://openrailwaymap.app
  - url: http://localhost:8000

tags:
  - name: search
    description: Search API
  - name: status
    description: Status API

externalDocs:
  description: GitHub
  url: https://github.com/hiddewie/OpenRailwayMap-vector#readme

paths:
  /api/status:
    get:
      operationId: status
      description: Status endpoint
      summary: Status endpoint
      tags:
        - status

  /api/replication_timestamp:
    get:
      operationId: replicationTimestamp
      description: The replication timestamp of the OpenStreetMap data
      summary: Replication endpoint
      tags:
        - replication
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  import_timestamp:
                    type: string
                    format: date-time
                    example: '2026-01-01T00:00:00Z'
                  replication_timestamp:
                    type: string
                    format: date-time
                    example: '2026-02-05T21:21:38Z'

  /api/facility:
    get:
      operationId: searchFacilities
      summary: Facility search
      description: |
        The facility endpoint returns detail of a facility (station, junction, yard, …) by its name or reference.
        
        The parameters q, name and ref are mutually exclusive.
        
        Reference is one of the supported facility reference tags, such as `railway:ref`, `uic_ref`, `ref:ibnr`, `ref:IFOPT`, `ref:EU:PLC` and others. See https://github.com/hiddewie/OpenRailwayMap-vector/edit/master/features/stations.yaml for the full list.
        
        It takes the first keyword of (name, ref) and the optional the operator to search for the data.
      tags:
        - search
      parameters:
        - name: q
          in: query
          schema:
            type: string
            example: Karlsruhe
          description: |
            search term (will be looked up in all `name=*` tags, `railway:ref=*`, `uic_ref=*`, `ref:ibnr`, `ref:IFOPT`, `ref:EU:PLC`, etc.)
        - name: name
          in: query
          schema:
            type: string
            example: Karlsruhe
          description: |
            search term (name search only)
        - name: ref
          in: query
          schema:
            type: string
            example: Gd
          description: |
            search by official facility reference number/code only
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 200
          description: maximum number of results
        - name: lang
          in: query
          schema:
            type: string
          required: false
          description: language to use for determining localized name
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    latitude:
                      type: number
                    longitude:
                      type: number
                    osm_ids:
                      type: array
                      items:
                        type: integer
                        description: |
                          OSM node ID
                    osm_types:
                      type: array
                      items:
                        type: string
                        enum:
                          - 'N'
                          - 'W'
                        description: |
                          The type of OSM object, same order as the IDs
                    name:
                      type: string
                      nullable: true
                    localized_name:
                      type: string
                      nullable: true
                      description: The localized name, if the `lang` parameter is given and present, otherwise equal to the name
                    railway:
                      type: string
                      nullable: true
                    station:
                      type: string
                      nullable: true
                    railway_ref:
                      type: string
                      nullable: true
                    uic_ref:
                      type: string
                      nullable: true
                    references:
                      type: object
                      nullable: true
                    operator:
                      type: array
                      items:
                        type: string
                    network:
                      type: array
                      items:
                        type: string
                    wikidata:
                      type: array
                      items:
                        type: string
                    wikimedia_commons:
                      type: array
                      items:
                        type: string
                    image:
                      type: array
                      items:
                        type: string
                    mapillary:
                      type: array
                      items:
                        type: string
                    wikipedia:
                      type: array
                      items:
                        type: string
                    note:
                      type: array
                      items:
                        type: string
                    description:
                      type: array
                      items:
                        type: string
                    rank:
                      type: integer
                      description: |
                        an importance rank calculated by taking the public transport route relations into account using this station/halt
                example:
                  - osm_ids:
                    - 5284961126
                    osm_types:
                      - "N"
                    name: Ostkreuz (Ringbahn)
                    localized_name: Ostkreuz (Ringbahn)
                    feature: station
                    state: present
                    station: light_rail
                    railway_ref: BOK
                    uic_ref: '8089028'
                    references:
                      uic: '8089028'
