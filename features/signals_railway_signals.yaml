          - { any: [ 'FR:VL', 'FR:(VL)', 'FR:VLc' ], value: 'fr/S_C-VL' }
        default: 'fr/S_C-S'
    tags:
      - { tag: 'railway:signal:main', value: 'FR:S' }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:shape', value: 'FR:C' }

  # F-type head
  - description: Sémaphore
    country: FR
