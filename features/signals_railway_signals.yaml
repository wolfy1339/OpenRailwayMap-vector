  # --- FR --- #

  # Icon filename format: Signal_Shape-State.svg

  # Filenames starting with the letter "C" represent both Carré
  # and Carré violet. This avoids creating redundant icons for
  # identical shapes and aspects under different prefixes
  # (e.g. C_* vs Cv_*).
  # Likewise, filenames starting with the letter "D" represent
  # both Disque and Avertissement.
  # Aspects are evaluated from most restrictive to least restrictive
  # (but for the S aspect).

  # Carré #

  # C is the most restrictive aspect for a Carré signal.
  # The Cv aspect must only appear on Cv signals (otherwise,
  # it indicates a mapping error).

  # Low-profile shape
  - description: Carré
    country: FR
    icon: [ default: 'fr/C_small-C' ]
    tags:
      - { tag: 'railway:signal:main', any: [ 'FR:CARRE', 'FR:C' ] }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:height', value: 'dwarf' }

  # C-type head
  - description: Carré
    country: FR
    icon:
      - match: 'railway:signal:main:states'
        cases:
          - { any: [ 'FR:M', 'FR:(M)', 'FR:Mr' ], value: 'fr/C_C-M' }
          - { any: [ 'FR:A', 'FR:(A)', 'FR:Ac' ], value: 'fr/C_C-A' }
          - { any: [ 'FR:VL', 'FR:(VL)', 'FR:VLc' ], value: 'fr/C_C-VL' }
          - { any: [ 'FR:S', 'FR:(S)', 'FR:Sc' ], value: 'fr/C_C-S' }
        default: 'fr/C_C-C'
    tags:
      - { tag: 'railway:signal:main', any: [ 'FR:CARRE', 'FR:C' ] }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:shape', value: 'FR:C' }

  # F-type head
  - description: Carré
    country: FR
    icon:
      - match: 'railway:signal:main:states'
        cases:
          - { any: [ 'FR:M', 'FR:(M)', 'FR:Mr' ], value: 'fr/C_F-M' }
          - { any: [ 'FR:A', 'FR:(A)', 'FR:Ac' ], value: 'fr/C_F-A' }
          - { any: [ 'FR:R+A', 'FR:R+(A)', 'FR:(R)+A', 'FR:(R)+(A)', 'FR:R(A)', 'FR:Rc(A)', 'FR:R(Ac)', 'FR:Rc(Ac)' ], value: 'fr/C_F-R-A' }
          - { any: [ 'FR:R', 'FR:(R)', 'FR:Rc' ], value: 'fr/C_F-R' }
          - { any: [ 'FR:VL', 'FR:(VL)', 'FR:VLc' ], value: 'fr/C_F-VL' }
          - { any: [ 'FR:S', 'FR:(S)', 'FR:Sc' ], value: 'fr/C_F-S' }
        default: 'fr/C_F-C'
    tags:
      - { tag: 'railway:signal:main', any: [ 'FR:CARRE', 'FR:C' ] }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:shape', value: 'FR:F' }

  # H-type head
  - description: Carré
    country: FR
    icon:
      - match: 'railway:signal:main:states'
        cases:
          - { any: [ 'FR:M', 'FR:(M)', 'FR:Mr' ], value: 'fr/C_H-M' }
          - { any: [ 'FR:RR+A', 'FR:RR+(A)', 'FR:(RR)+A', 'FR:(RR)+(A)', 'FR:RR(A)', 'FR:RRc(A)', 'FR:RR(Ac)', 'FR:RRc(Ac)' ], value: 'fr/C_H-RR-A' }
          - { any: [ 'FR:RR', 'FR:(RR)', 'FR:RRc' ], value: 'fr/C_H-RR' }
          - { any: [ 'FR:A', 'FR:(A)', 'FR:Ac' ], value: 'fr/C_H-A' }
          - { any: [ 'FR:R+A', 'FR:R+(A)', 'FR:(R)+A', 'FR:(R)+(A)', 'FR:R(A)', 'FR:Rc(A)', 'FR:R(Ac)', 'FR:Rc(Ac)' ], value: 'fr/C_H-R-A' }
          - { any: [ 'FR:R', 'FR:(R)', 'FR:Rc' ], value: 'fr/C_H-R' }
          - { any: [ 'FR:VL', 'FR:(VL)', 'FR:VLc' ], value: 'fr/C_H-VL' }
          - { any: [ 'FR:S', 'FR:(S)', 'FR:Sc' ], value: 'fr/C_H-S' }
        default: 'fr/C_H-C'
    tags:
      - { tag: 'railway:signal:main', any: [ 'FR:CARRE', 'FR:C' ] }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:shape', value: 'FR:H' }

  # Fallback: infer shape from supported states
  - description: Carré
    country: FR
    icon:
      - match: 'railway:signal:main:states'
        cases:
          # H-type head
          - { any: [ 'FR:RR+A', 'FR:RR+(A)', 'FR:(RR)+A', 'FR:(RR)+(A)', 'FR:RR(A)', 'FR:RRc(A)', 'FR:RR(Ac)', 'FR:RRc(Ac)' ], value: 'fr/C_H-RR-A-2' }
          - { any: [ 'FR:RR', 'FR:(RR)', 'FR:RRc' ], value: 'fr/C_H-RR-2' }
          # F-type head
          - { any: [ 'FR:R+A', 'FR:R+(A)', 'FR:(R)+A', 'FR:(R)+(A)', 'FR:R(A)', 'FR:Rc(A)', 'FR:R(Ac)', 'FR:Rc(Ac)' ], value: 'fr/C_F-R-A-2' }
          - { any: [ 'FR:R', 'FR:(R)', 'FR:Rc' ], value: 'fr/C_F-R-2' }
        # C-type head
        default: 'fr/C_C-C-2'
    tags:
      - { tag: 'railway:signal:main', any: [ 'FR:CARRE', 'FR:C' ] }
      - { tag: 'railway:signal:main:form', value: 'light' }

