          - { any: [ 'FR:A', 'FR:(A)', 'FR:Ac' ], value: 'fr/S_F-A' }
          - { any: [ 'FR:R+A', 'FR:R+(A)', 'FR:(R)+A', 'FR:(R)+(A)', 'FR:R(A)', 'FR:Rc(A)', 'FR:R(Ac)', 'FR:Rc(Ac)' ], value: 'fr/S_F-R-A' }
          - { any: [ 'FR:R', 'FR:(R)', 'FR:Rc' ], value: 'fr/S_F-R' }
          - { any: [ 'FR:VL', 'FR:(VL)', 'FR:VLc' ], value: 'fr/S_F-VL' }
        default: 'fr/S_F-S'
    tags:
      - { tag: 'railway:signal:main', value: 'FR:S' }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:shape', value: 'FR:F' }

  # H-type head
  - description: Sémaphore
    country: FR
    icon:
      - match: 'railway:signal:main:states'
        cases:
          - { any: [ 'FR:RR+A', 'FR:RR+(A)', 'FR:(RR)+A', 'FR:(RR)+(A)', 'FR:RR(A)', 'FR:RRc(A)', 'FR:RR(Ac)', 'FR:RRc(Ac)' ], value: 'fr/S_H-RR-A' }
          - { any: [ 'FR:RR', 'FR:(RR)', 'FR:RRc' ], value: 'fr/S_H-RR' }
          - { any: [ 'FR:A', 'FR:(A)', 'FR:Ac' ], value: 'fr/S_H-A' }
          - { any: [ 'FR:R+A', 'FR:R+(A)', 'FR:(R)+A', 'FR:(R)+(A)', 'FR:R(A)', 'FR:Rc(A)', 'FR:R(Ac)', 'FR:Rc(Ac)' ], value: 'fr/S_H-R-A' }
          - { any: [ 'FR:R', 'FR:(R)', 'FR:Rc' ], value: 'fr/S_H-R' }
          - { any: [ 'FR:VL', 'FR:(VL)', 'FR:VLc' ], value: 'fr/S_H-VL' }
        default: 'fr/S_H-S'
    tags:
      - { tag: 'railway:signal:main', value: 'FR:S' }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:shape', value: 'FR:H' }

  # K-type head
  - description: Sémaphore
    country: FR
    icon: [ default: 'fr/S_K-S' ]
    tags:
      - { tag: 'railway:signal:main', value: 'FR:S' }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:shape', value: 'FR:K' }

  # Fallback: infer shape from supported states
  - description: Sémaphore
    country: FR
    icon:
      - match: 'railway:signal:main:states'
        cases:
          # H-type head
          - { any: [ 'FR:RR+A', 'FR:RR+(A)', 'FR:(RR)+A', 'FR:(RR)+(A)', 'FR:RR(A)', 'FR:RRc(A)', 'FR:RR(Ac)', 'FR:RRc(Ac)' ], value: 'fr/S_H-RR-A-1' }
          - { any: [ 'FR:RR', 'FR:(RR)', 'FR:RRc' ], value: 'fr/S_H-RR-1' }
          # F-type head
          - { any: [ 'FR:R+A', 'FR:R+(A)', 'FR:(R)+A', 'FR:(R)+(A)', 'FR:R(A)', 'FR:Rc(A)', 'FR:R(Ac)', 'FR:Rc(Ac)' ], value: 'fr/S_F-R-A-1' }
