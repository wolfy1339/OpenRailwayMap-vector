          - { any: [ 'FR:S', 'FR:(S)', 'FR:Sc' ], value: 'fr/C_H-S-1' }
        default: 'fr/C_H-Cv'
    tags:
      - { tag: 'railway:signal:main', value: 'FR:CV' }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:shape', value: 'FR:H' }

  # K-type head
  - description: Carré violet
    country: FR
    icon: [ default: 'fr/Cv_K-Cv' ]
    tags:
      - { tag: 'railway:signal:main', value: 'FR:CV' }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:shape', value: 'FR:K' }

  # Fallback: infer shape from supported states
  - description: Carré violet
    country: FR
    icon:
      - match: 'railway:signal:main:states'
        cases:
          # H-type head
          - { any: [ 'FR:RR+A', 'FR:RR+(A)', 'FR:(RR)+A', 'FR:(RR)+(A)', 'FR:RR(A)', 'FR:RRc(A)', 'FR:RR(Ac)', 'FR:RRc(Ac)' ], value: 'fr/C_H-RR-A-3' }
          - { any: [ 'FR:RR', 'FR:(RR)', 'FR:RRc' ], value: 'fr/C_H-RR-3' }
          # F-type head
          - { any: [ 'FR:R+A', 'FR:R+(A)', 'FR:(R)+A', 'FR:(R)+(A)', 'FR:R(A)', 'FR:Rc(A)', 'FR:R(Ac)', 'FR:Rc(Ac)' ], value: 'fr/C_F-R-A-3' }
          - { any: [ 'FR:R', 'FR:(R)', 'FR:Rc' ], value: 'fr/C_F-R-3' }
          # Could be A-type, C-type or K-type heads but
          # only 'railway:signal:main:shape' can tell.
        # Assume C-type head
        default: 'fr/C_C-Cv-3'
    tags:
      - { tag: 'railway:signal:main', value: 'FR:CV' }
      - { tag: 'railway:signal:main:form', value: 'light' }

  # Sémaphore #

  # S is the most restrictive aspect for a Sémaphore signal.
  # The C and Cv aspects must not appear on S signals.
  # (otherwise, it indicates a mapping error).

  # A-type head
  - description: Sémaphore
    country: FR
    icon:
      - match: 'railway:signal:main:states'
        cases:
          - { any: [ 'FR:A', 'FR:(A)', 'FR:Ac' ], value: 'fr/S_A-A' }
          - { any: [ 'FR:VL', 'FR:(VL)', 'FR:VLc' ], value: 'fr/S_A-VL' }
        default: 'fr/S_A-S'
    tags:
      - { tag: 'railway:signal:main', value: 'FR:S' }
      - { tag: 'railway:signal:main:form', value: 'light' }
      - { tag: 'railway:signal:main:shape', value: 'FR:A' }

  # C-type head
  - description: Sémaphore
    country: FR
    icon:
      - match: 'railway:signal:main:states'
        cases:
